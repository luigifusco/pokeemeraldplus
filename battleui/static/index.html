<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f1013">
    <title>battleui</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- LEFT: status & mons -->
        <aside class="left">
            <div id="status" class="status status-offline">offline</div>
            <div class="mons">
                <div class="mon-card" id="ctrlCard">
                    <div class="mon-tag">YOU CONTROL</div>
                    <div id="controlledMon"></div>
                </div>
                <div class="mon-card" id="leftCard">
                    <div class="mon-tag">TARGET L</div>
                    <div id="targetLeft"></div>
                </div>
                <div class="mon-card" id="rightCard">
                    <div class="mon-tag">TARGET R</div>
                    <div id="targetRight"></div>
                </div>
            </div>
        </aside>

        <!-- RIGHT: action panel -->
        <main class="right">
            <nav class="tabs">
                <button data-tab="fight"  class="tab active">⚔ Fight</button>
                <button data-tab="switch" class="tab">↻ Switch</button>
                <button data-tab="item"   class="tab">★ Item</button>
                <button data-tab="cancel" class="tab" id="cancelTab">✕ Cancel</button>
            </nav>

            <div id="idle" class="pane idle-pane">
                <div class="idle-text">Awaiting battle decision…</div>
            </div>

            <div id="pane-fight" class="pane">
                <div id="moveGrid" class="grid-2x2"></div>
                <div id="targetPicker" class="target-picker hidden">
                    <button class="target-btn" data-t="L">
                        <div class="target-arrow">◀</div>
                        <div class="target-label">LEFT</div>
                        <div class="target-sub" id="tpL"></div>
                    </button>
                    <button class="target-btn" data-t="R">
                        <div class="target-arrow">▶</div>
                        <div class="target-label">RIGHT</div>
                        <div class="target-sub" id="tpR"></div>
                    </button>
                </div>
            </div>

            <div id="pane-switch" class="pane hidden">
                <div id="partyList" class="grid-2x3"></div>
            </div>

            <div id="pane-item" class="pane hidden">
                <div id="itemList" class="grid-2x3"></div>
            </div>

            <div id="pane-cancel" class="pane hidden cancel-pane">
                <div class="cancel-text">Cancel your partner's pending action?</div>
                <button id="submitCancel" class="big-btn">CONFIRM</button>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
